name: Recommender Build 2

on:
  workflow_dispatch

env:
  IMAGE_NAME: ghcr.io/s210929/teastore/teastore-recommender
  IMAGE_TAG: loadtest

jobs:
  build:
    name: Build recommender
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '11'

      - name: Build recommender
        run: |
          mvn clean install \
            -pl services/tools.descartes.teastore.recommender \
            -am

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push recommender image
        uses: docker/build-push-action@v5
        with:
          context: ./services/tools.descartes.teastore.recommender
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

  loadtest:
    name: Locust load test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start docker container
        run: docker compose -f examples/docker/docker-compose_recommender.yaml up -d

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Locust
        run: |
          python -m pip install --upgrade pip
          pip install "locust[fast]"
        
      - name: Docker logs
        run: docker compose -f examples/docker/docker-compose_recommender.yaml logs
        
      - name: Docker ps
        run: docker ps -a

      - name: Train recommender
        run: |
          curl -X GET \
          http://recommender-1:8080/tools.descartes.teastore.recommender/rest/train

      - name: Start container monitoring
        run: |
          (
            while true; do
              docker stats --no-stream --format \
              "{{.Name}},{{.CPUPerc}},{{.MemUsage}},{{.NetIO}}" \
              >> stats.csv
              sleep 2
            done
          ) &
          echo $! > monitor.pid

      - name: Run Locust load test
        run: |
          locust \
            -f examples/locust/locust_recommender.py \
            --headless \
            -u 20 \
            -r 5 \
            -t 1m \
            --host http://localhost:8080

      - name: Stop monitoring
        run: |
          kill $(cat monitor.pid)
      
      - name: Stop docker container
        run: docker compose -f examples/docker/docker-compose_recommender.yaml down --volumes --remove-orphans

      - name: Upload container stats
        uses: actions/upload-artifact@v4
        with:
          name: container-stats
          path: stats.csv