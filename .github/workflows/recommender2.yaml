name: Recommender Build 2

on:
  workflow_dispatch

env:
  IMAGE_NAME: ghcr.io/s210929/teastore/teastore-recommender
  IMAGE_TAG: loadtest

jobs:
  build:
    name: Build recommender
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '11'

      - name: Build recommender
        run: |
          mvn clean install \
            -pl services/tools.descartes.teastore.recommender \
            -am

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push recommender image
        uses: docker/build-push-action@v5
        with:
          context: ./services/tools.descartes.teastore.recommender
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

  loadtest:
    name: Locust load test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start Registry
        run: |
          docker run -d \
            --name teastore-registry \
            -p 8080:8080 \
            descartesresearch/teastore-registry   

      - name: Start DB
        run: |
          docker run -d \
            --name teastore-db \
            -p 3306:3306 \
            descartesresearch/teastore-db

      - name: Wait for DB
        run: |
            until nc -z localhost 3306; do
                echo "Waiting for DB..."
                sleep 3
            done

      - name: Start Persistence
        run: |
          docker run -d \
            --name teastore-persistence \
            --link teastore-db \
            -p 8082:8080 \
            -e "DB_HOST=teastore-db" \
            -e "DB_PORT=3306" \
            -e "DB_NAME=teadb" \
            -e "DB_USER=root" \
            -e "DB_PASSWORD=root" \
            descartesresearch/teastore-persistence

      - name: Debug containers
        run: |
            docker ps -a
            echo "---- DB logs ----"
            docker logs teastore-db || true
            echo "---- Persistence logs ----"
            docker logs teastore-persistence || true
            echo "---- Registry logs ----"
            docker logs teastore-registry || true

      - name: Wait for persistence
        run: |
          until curl -s http://localhost:8082 > /dev/null; do
            echo "Waiting for persistence..."
            sleep 5
          done
        
      - name: Debug containers 2
        run: |
            docker ps -a
            echo "---- DB logs ----"
            docker logs teastore-db || true
            echo "---- Persistence logs ----"
            docker logs teastore-persistence || true

      - name: Start recommender container
        run: |
          docker run -d \
            --name teastore-recommender \
            --link teastore-persistence \
            --link teastore-registry \
            -p 8081:8080 \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Wait for recommender
        run: |
          until curl -s http://localhost:8081 > /dev/null; do
            echo "Waiting for recommender..."
            sleep 5
          done
      
      - name: Stream recommender logs
        run: |
            docker logs -f teastore-recommender &    
          
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Locust
        run: |
          python -m pip install --upgrade pip
          pip install "locust[fast]"

      - name: Train recommender
        run: |
          curl -X GET \
          http://localhost:8081/tools.descartes.teastore.recommender/rest/train

      - name: Start container monitoring
        run: |
          (
            while true; do
              docker stats --no-stream --format \
              "{{.Name}},{{.CPUPerc}},{{.MemUsage}},{{.NetIO}}" \
              >> stats.csv
              sleep 2
            done
          ) &
          echo $! > monitor.pid

      - name: Run Locust load test
        run: |
          locust \
            -f examples/locust/locust_recommender.py \
            --headless \
            -u 20 \
            -r 5 \
            -t 1m \
            --host http://localhost:8081

      - name: Stop monitoring
        run: |
          kill $(cat monitor.pid)

      - name: Upload container stats
        uses: actions/upload-artifact@v4
        with:
          name: container-stats
          path: stats.csv