# OpenTelemetry Java Agent Configuration
# This file configures the OpenTelemetry Java agent behavior

# Service name (can be overridden by OTEL_SERVICE_NAME environment variable)
otel.service.name=teastore

# Metrics exporter configuration
# By default, uses OTLP exporter which sends to localhost:4317
otel.exporter.otlp.protocol=grpc
otel.exporter.otlp.endpoint=http://localhost:4317

# Enable specific instrumentations
otel.instrumentation.servlet.enabled=true
otel.instrumentation.http-client.enabled=true
otel.instrumentation.jdbc.enabled=true
otel.instrumentation.tomcat.enabled=true

# Metrics configuration
otel.sdk.disabled=false
otel.metrics.enabled=true

# Span samplers
otel.traces.sampler=always_on

# Resource attributes
otel.resource.attributes=service.name=teastore,host.name=unknown

# Enable logging of OpenTelemetry
otel.javaagent.logging=true
otel.javaagent.debug=false
