---
# ============================================================================
# TEASTORE REGISTRY SERVICE
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teastore-registry
  labels:
    app: teastore
    run: teastore-registry
spec:
  selector:
    matchLabels:
      app: teastore
      run: teastore-registry
  template:
    metadata:
      labels:
        app: teastore
        run: teastore-registry
    spec:
      initContainers:
      - name: wait-for-otel-collector
        image: busybox:1.28
        command: ['sh', '-c', 'until wget -q --spider http://otel-collector:13133; do echo waiting for collector; sleep 2; done']
      containers:
      - name: teastore-registry
        image: descartesresearch/teastore-registry
        ports:
        - containerPort: 8080
        env:
        - name: USE_POD_IP
          value: "true"
        - name: ENABLE_OTEL
          value: "true"
        - name: OTEL_SERVICE_NAME
          value: "teastore-registry"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector:4317"
        volumeMounts:
        - name: metrics
          mountPath: /metrics
      volumes:
      - name: metrics
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: teastore-registry
  labels:
    app: teastore
    run: teastore-registry
spec:
  ports:
  - port: 8080
    protocol: TCP
  selector:
    run: teastore-registry

